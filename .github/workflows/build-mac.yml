name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build app
        run: |
          pyinstaller --windowed --onedir app.py

      - name: Copy utils folder
        run: |
          cp -R utils dist/app/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/app